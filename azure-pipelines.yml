trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerRegistryServiceConnection: 'carpredictionacr'
  imageRepository: 'car-predictor'
  containerRegistry: 'carpredictionacr.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildImage
    displayName: Build Docker Image
    steps:
    - task: Docker@2
      displayName: Build and push image to ACR
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: Deploy to App Service
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: Deploy
    displayName: Deploy to Production
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: Deploy to Azure App Service
            inputs:
              azureSubscription: 'azure-subscription'
              appName: 'car-price-predictor'
              containers: $(containerRegistry)/$(imageRepository):$(tag)
              imageName: '$(containerRegistry)/$(imageRepository):$(tag)'

- stage: Test
  displayName: Test Deployment
  dependsOn: Deploy
  condition: succeeded()
  jobs:
  - job: TestApp
    displayName: Test Application
    steps:
    - task: CmdLine@2
      displayName: Test endpoint
      inputs:
        script: |
          curl -f https://car-price-predictor.azurewebsites.net/ || exit 1
          echo "Application is running successfully!"
