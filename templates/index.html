<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 50px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            background-color: #f8f9fa;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        select:hover {
            border-color: #667eea;
            background-color: #f0f0ff;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .submit-button {
            width: 100%;
            padding: 14px;
            margin-top: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .submit-button:active {
            transform: translateY(0);
        }

        .result-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        .result-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            animation: popIn 0.5s ease-out;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .result-label {
            font-size: 14px;
            font-weight: 500;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .result-value {
            font-size: 42px;
            font-weight: 700;
            margin: 10px 0;
        }

        .result-currency {
            font-size: 18px;
            font-weight: 600;
            opacity: 0.9;
        }

        .error-box {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #c33;
            margin-top: 20px;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 24px;
            }
            .result-value {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Car Price Predictor</h1>
        <p class="subtitle">Get instant price predictions for your vehicle</p>

        <form method="POST" action="/predictdata">
            <div class="form-group">
                <label for="company">Car Company</label>
                <select id="company" name="Company" required>
                    <option value="">Select a company...</option>
                    <option value="Chevrolet">Chevrolet</option>
                    <option value="Dodge">Dodge</option>
                    <option value="Ford">Ford</option>
                    <option value="Volkswagen">Volkswagen</option>
                    <option value="Mercedes-B">Mercedes-B</option>
                    <option value="Mitsubishi">Mitsubishi</option>
                    <option value="Chrysler">Chrysler</option>
                    <option value="Oldsmobile">Oldsmobile</option>
                    <option value="Toyota">Toyota</option>
                    <option value="Nissan">Nissan</option>
                    <option value="Mercury">Mercury</option>
                    <option value="Lexus">Lexus</option>
                    <option value="Pontiac">Pontiac</option>
                    <option value="BMW">BMW</option>
                    <option value="Volvo">Volvo</option>
                    <option value="Honda">Honda</option>
                    <option value="Acura">Acura</option>
                    <option value="Cadillac">Cadillac</option>
                    <option value="Plymouth">Plymouth</option>
                    <option value="Saturn">Saturn</option>
                    <option value="Lincoln">Lincoln</option>
                    <option value="Audi">Audi</option>
                    <option value="Buick">Buick</option>
                    <option value="Subaru">Subaru</option>
                    <option value="Jeep">Jeep</option>
                    <option value="Porsche">Porsche</option>
                    <option value="Hyundai">Hyundai</option>
                    <option value="Saab">Saab</option>
                    <option value="Infiniti">Infiniti</option>
                    <option value="Jaguar">Jaguar</option>
                </select>
            </div>

            <div class="form-group">
                <label for="engine">Engine Type</label>
                <select id="engine" name="Engine" required>
                    <option value="">Select engine type...</option>
                    <option value="Double Overhead Camshaft">Double Overhead Camshaft</option>
                    <option value="Single Overhead Camshaft">Single Overhead Camshaft</option>
                </select>
            </div>

            <div class="form-group">
                <label for="transmission">Transmission</label>
                <select id="transmission" name="Transmission" required>
                    <option value="">Select transmission...</option>
                    <option value="Auto">Automatic</option>
                    <option value="Manual">Manual</option>
                </select>
            </div>

            <div class="form-group">
                <label for="color">Car Color</label>
                <select id="color" name="Color" required>
                    <option value="">Select color...</option>
                    <option value="Pale White">Pale White</option>
                    <option value="Black">Black</option>
                    <option value="Red">Red</option>
                </select>
            </div>

            <div class="form-group">
                <label for="body_style">Body Style</label>
                <select id="body_style" name="Body_Style" required>
                    <option value="">Select body style...</option>
                    <option value="SUV">SUV</option>
                    <option value="Hatchback">Hatchback</option>
                    <option value="Sedan">Sedan</option>
                    <option value="Passenger">Passenger</option>
                    <option value="Hardtop">Hardtop</option>
                </select>
            </div>

            <div class="form-group">
                <label for="dealer_region">Dealer Region</label>
                <select id="dealer_region" name="Dealer_Region" required>
                    <option value="">Select region...</option>
                    <option value="Austin">Austin</option>
                    <option value="Janesville">Janesville</option>
                    <option value="Scottsdale">Scottsdale</option>
                    <option value="Pasco">Pasco</option>
                    <option value="Aurora">Aurora</option>
                    <option value="Middletown">Middletown</option>
                    <option value="Greenville">Greenville</option>
                </select>
            </div>

            <button type="submit" class="submit-button">Predict Price</button>
        </form>

        <div id="resultContainer"></div>
    </div>

    <script>
        // Get the results from Flask via the rendered variable
        const resultValue = '{{ results }}';
        const resultContainer = document.getElementById('resultContainer');
        
        if (resultValue && resultValue !== '' && resultValue !== 'None') {
            const isError = resultValue.includes('Error') || resultValue.includes('error');
            
            if (isError) {
                resultContainer.innerHTML = '<div class="result-section"><div class="error-box">Error: ' + resultValue + '</div></div>';
            } else {
                resultContainer.innerHTML = '<div class="result-section"><div class="result-box"><div class="result-label">Predicted Price</div><div class="result-value">$' + resultValue + '</div><div class="result-currency">USD</div></div></div>';
            }
        }
    </script>
</body>
</html>
